</head>
<body>

    <header class="navbar">
        <div class="container">

                <a href="index.html">

            </div>
            <nav class="nav-links">
                <a href="index.html" class="active">Home</a>
                <a href="portfolio.html">Portfolio Page</a>
            </nav>
        </div>
    </header>

    <main class="content-spacer">
        <div class="container ai-container">
            <div class="ai-card">
                <h2 class="ai-title">Botanix AI Diagnostics</h2>
                <p class="ai-description">Click start and allow camera access to scan plants for diseases.</p>
                
                <button type="button" class="btn-primary" onclick="init()">Start Scanner</button>

    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-top">
                <div class="footer-left">
                    <a href="index.html">
                        <img src="image_1.png" alt="Botanix Logo" class="footer-brand-logo">
                    </a>
                </div>
                
                <div class="footer-center">
                    <p>Botanix AI Lab</p>
                    <p>Independence Square, Colombo 07</p>
                    <p>contact@botanix.lk</p>
                    <p>+94 11 234 5678</p>
                </div>

                <div class="footer-right">
                    <a href="#" class="social-icon fb"><i class="fab fa-facebook-f"></i></a>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script type="text/javascript">
        // the link to your model provided by Teachable Machine export panel
        const URL = "./my_model/";

        let model, webcam, labelContainer, maxPredictions;

        // Load the image model and setup the webcam
        async function init() {
            // Disable button to prevent multiple clicks
            document.querySelector(".btn-primary").innerText = "Loading Model...";
            document.querySelector(".btn-primary").disabled = true;

            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            // Convenience function to setup a webcam
            const flip = true; // whether to flip the webcam
            webcam = new tmImage.Webcam(250, 250, flip); // Increased size slightly to 250x250
            await webcam.setup(); // request access to the webcam
            await webcam.play();
            window.requestAnimationFrame(loop);

            // append elements to the DOM
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
            
            // Clear existing labels if clicked again
            labelContainer.innerHTML = ""; 
            
            for (let i = 0; i < maxPredictions; i++) { // and class labels
                labelContainer.appendChild(document.createElement("div"));
            }

            // Update button state
            document.querySelector(".btn-primary").innerText = "Scanner Active";
            document.querySelector(".btn-primary").style.backgroundColor = "#E1306C"; // Turn red-ish to indicate live
        }

        async function loop() {
            webcam.update(); // update the webcam frame
            await predict();
            window.requestAnimationFrame(loop);
        }

        // run the webcam image through the image model
        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            for (let i = 0; i < maxPredictions; i++) {
                // Formatting to look a bit cleaner
                const className = prediction[i].className;
                const probability = (prediction[i].probability * 100).toFixed(0) + "%";
                const classPrediction = `<span>${className}</span> <strong>${probability}</strong>`;
                labelContainer.childNodes[i].innerHTML = classPrediction;
            }
        }
    </script>
</body>
</html>
