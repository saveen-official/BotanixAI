    <script> const URL = "./my_model/"; // Or your Cloud Link
let model, webcam, labelContainer, maxPredictions;

async function init() {
    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";

    model = await tmImage.load(modelURL, metadataURL);
    maxPredictions = model.getTotalClasses();

    const flip = true; 
    webcam = new tmImage.Webcam(250, 250, flip); 
    await webcam.setup(); 
    await webcam.play();

    // Start the webcam visual loop so the user sees a "live" camera
    window.requestAnimationFrame(loop);

    document.getElementById("webcam-container").appendChild(webcam.canvas);
    
    // UI Changes: Hide Start, Show Analyze
    document.getElementById("start-btn").style.display = "none";
    document.getElementById("capture-btn").style.display = "block";
}

// This loop ONLY updates the video feed, it doesn't run the AI anymore
async function loop() {
    webcam.update(); 
    window.requestAnimationFrame(loop);
}

// This only runs when the "Analyze" button is clicked
async function predict() {
    const diagnosisDiv = document.getElementById("diagnosis-result");
    diagnosisDiv.innerHTML = "Analyzing...";

    const prediction = await model.predict(webcam.canvas);
    
    // Find the prediction with the highest probability
    let highestProb = 0;
    let bestMatch = "";

    for (let i = 0; i < maxPredictions; i++) {
        if (prediction[i].probability > highestProb) {
            highestProb = prediction[i].probability;
            bestMatch = prediction[i].className;
        }
    }

    // Display the result beautifully
    const confidence = (highestProb * 100).toFixed(0);
    diagnosisDiv.innerHTML = `
        <div class="diagnosis-card">
            <h3>Detection: ${bestMatch}</h3>
            <p>Confidence: ${confidence}%</p>
        </div>
    `;
}
    </script>
