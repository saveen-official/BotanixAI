<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botanix | AI Plant Diagnostics</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="navbar">
        <div class="container">
            <div class="logo">
                <a href="index.html"><img src="image_1.png" alt="Botanix Logo" class="brand-logo"></a>
            </div>
            <nav class="nav-links">
                <a href="https://yasithbuckeroo2026.wixsite.com/botanix" class="active">Home</a>
                <a href="https://yasithbuckeroo2026.wixsite.com/botanix/portfolio">Portfolio Page</a>
            </nav>
        </div>
    </header>

    <main class="content-spacer">
        <div class="container ai-container">
            <div class="ai-card">
                <h2 class="ai-title">Botanix AI Diagnostics</h2>
                <p class="ai-description">Scan a plant via camera or upload a photo for instant disease detection.</p>
                
                <div id="initial-controls">
                    <button type="button" id="start-btn" class="btn-primary" onclick="init()">
                        <i class="fas fa-camera"></i> Start Live Camera
                    </button>
                    <div class="divider"><span>OR</span></div>
                    <input type="file" id="file-upload" accept="image/*" style="display:none;" onchange="handleFileUpload(event)">
                    <button type="button" class="btn-upload" onclick="document.getElementById('file-upload').click()">
                        <i class="fas fa-file-upload"></i> Upload Photo
                    </button>
                </div>
                
                <div id="webcam-container" class="webcam-box" style="display:none;"></div>

                <div id="capture-container" class="webcam-box" style="display:none;">
                    <canvas id="captured-photo"></canvas>
                </div>

                <div class="button-group">
                    <button type="button" id="capture-btn" class="btn-secondary" onclick="captureAndPredict()" style="display:none;">Analyze Plant</button>
                    <button type="button" id="retake-btn" class="btn-primary" onclick="resetScanner()" style="display:none;">New Scan</button>
                </div>

                <div id="diagnosis-result"></div>

                <button type="button" class="btn-reset-app" onclick="hardReset()">
                    <i class="fas fa-sync-alt"></i> Reset App State
                </button>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-top">
                <div class="footer-left">
                    <img src="image_1.png" alt="Botanix Logo" class="footer-brand-logo">
                </div>
                <div class="footer-center">
                    <p>Botanix AI Project<br>Faculty of Computing, SLIIT, Malabe<br>botanix.site@gmail.com</p>
                </div>
                <div class="footer-right">
                    <a href="https://www.facebook.com/profile.php?id=61582209766650&sk=directory_links" class="social-icon fb"><i class="fab fa-facebook-f"></i></a>
                    <a href="https://www.instagram.com/botanix.ai/" class="social-icon ig"><i class="fab fa-instagram"></i></a>
                    <a href="#" class="social-icon yt"><i class="fab fa-youtube"></i></a>
                    
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 Botanix AI. Pioneering agricultural diagnostics in Sri Lanka.</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script type="text/javascript">
        const URL = "./my_model/";

        // Dictionary for disease descriptions and recommended actions
        const diseaseInfo = {
            "Rice Blast": {
                description: "A serious fungal disease that causes spindle-shaped spots on leaves.",
                action: "Apply fungicides like Tricyclazole and avoid excessive nitrogen fertilizer."
            },
            "Bacterial Leaf Blight": {
                description: "Causes yellow to white wavy stripes on leaf blades, eventually drying them out.",
                action: "Use resistant varieties and ensure proper field drainage."
            },
            "Brown Spot": {
                description: "Characterized by oval, dark brown lesions. Often a sign of nutritional stress.",
                action: "Improve soil fertility (Potassium) and use clean, treated seeds."
            },
            "Papaya Ring Spot": {
                description: "The plant shows no visible signs of the tracked diseases.",
                action: "Continue regular monitoring and standard fertilization schedules."
            },

            // Add all your Teachable Machine categories here!
        };

        let model, webcam, maxPredictions;
        let isStatic = false;
        let animationId; // Crucial for stopping the background loop

        async function loadModel() {
            if (!model) {
                model = await tmImage.load(URL + "model.json", URL + "metadata.json");
                maxPredictions = model.getTotalClasses();
            }
        }

        async function init() {
            try {
                const startBtn = document.getElementById("start-btn");
                startBtn.innerText = "Initializing...";
                startBtn.disabled = true;

                await loadModel();
                
                if (webcam) { await webcam.stop(); }

                webcam = new tmImage.Webcam(250, 250, true);
                await webcam.setup();
                await webcam.play();
                
                isStatic = false;
                // Capture the ID so we can kill it when capturing/resetting
                animationId = window.requestAnimationFrame(loop);

                const container = document.getElementById("webcam-container");
                container.innerHTML = ""; 
                container.appendChild(webcam.canvas);
                
                container.style.display = "block";
                document.getElementById("initial-controls").style.display = "none";
                document.getElementById("capture-btn").style.display = "block";
            } catch (err) {
                console.error(err);
                alert("Camera access denied or failed.");
                hardReset();
            }
        }

        async function loop() {
            if (!isStatic && webcam && webcam.canvas) {
                webcam.update();
                animationId = window.requestAnimationFrame(loop);
            }
        }

        async function captureAndPredict() {
            isStatic = true;
            // KILL the loop so the browser stops working in the background
            window.cancelAnimationFrame(animationId); 

            const staticCanvas = document.getElementById("captured-photo");
            const ctx = staticCanvas.getContext("2d");
            staticCanvas.width = webcam.canvas.width;
            staticCanvas.height = webcam.canvas.height;
            ctx.drawImage(webcam.canvas, 0, 0);

            document.getElementById("webcam-container").style.display = "none";
            document.getElementById("capture-container").style.display = "block";
            document.getElementById("capture-btn").style.display = "none";
            document.getElementById("retake-btn").style.display = "block";

            runDiagnosis(staticCanvas);
        }

        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            await loadModel();
            if (webcam) { 
                await webcam.stop(); 
                window.cancelAnimationFrame(animationId);
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    isStatic = true;
                    const staticCanvas = document.getElementById("captured-photo");
                    const ctx = staticCanvas.getContext("2d");
                    staticCanvas.width = 250;
                    staticCanvas.height = 250;
                    ctx.drawImage(img, 0, 0, 250, 250);

                    document.getElementById("initial-controls").style.display = "none";
                    document.getElementById("webcam-container").style.display = "none";
                    document.getElementById("capture-container").style.display = "block";
                    document.getElementById("retake-btn").style.display = "block";
                    runDiagnosis(staticCanvas);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // 1. Define the categories you want to hide (Names must match exactly what is in Teachable Machine)
        const hiddenClasses = ["HEALTHY Potato", "HEALTHY Coconut", "HEALTHY Carrots", "HEALTHY Rice", "HEALTHY Banana", "HEALTHY Cabbage", "HEALTHY Onion", "People", "HEALTHY Sugarcane", "HEALTHY Pumpkin", "HEALTHY Chilli", "HEALTHY Papaya"]; 

        async function runDiagnosis(source) {
            const resultDiv = document.getElementById("diagnosis-result");
            resultDiv.innerHTML = "<p>Analyzing...</p>";
            
            const prediction = await model.predict(source);
            let topClass = "";
            let topProb = 0;

            // 2. Loop through the results to find the highest probability
            prediction.forEach(p => {
                if (p.probability > topProb) {
                    topProb = p.probability;
                    topClass = p.className;
                }
            });

            // 3. Check if the top result is in our 'hidden' list
            if (hiddenClasses.includes(topClass)) {
                resultDiv.innerHTML = `
                    <div class="diagnosis-card" style="border-left-color: #888;">
                        <h3>No Disease Detected</h3>
                        <p>The plant appears to be healthy or no disease was identified.</p>
                    </div>
                `;
            } else {
                // 4. Show the result only if it's a 'disease' category
                const confidence = (topProb * 100).toFixed(0);
                resultDiv.innerHTML = `
                    <div class="diagnosis-card">
                        <h3>Result: ${topClass}</h3>
                        <p>Confidence Score: ${confidence}%</p>
                    </div>
                `;
            }
        }        
        

        function resetScanner() {
            isStatic = false;
            if (webcam) {
                document.getElementById("webcam-container").style.display = "block";
                document.getElementById("capture-btn").style.display = "block";
                animationId = window.requestAnimationFrame(loop);
            } else {
                document.getElementById("initial-controls").style.display = "block";
            }
            document.getElementById("capture-container").style.display = "none";
            document.getElementById("retake-btn").style.display = "none";
            document.getElementById("diagnosis-result").innerHTML = "";
        }

        async function hardReset() {
            isStatic = false;
            window.cancelAnimationFrame(animationId);
            if (webcam) { await webcam.stop(); webcam = null; }
            
            document.getElementById("initial-controls").style.display = "block";
            document.getElementById("webcam-container").style.display = "none";
            document.getElementById("capture-container").style.display = "none";
            document.getElementById("capture-btn").style.display = "none";
            document.getElementById("retake-btn").style.display = "none";
            document.getElementById("diagnosis-result").innerHTML = "";
            document.getElementById("start-btn").innerText = "Start Live Camera";
            document.getElementById("start-btn").disabled = false;
        }
    </script>
</body>
</html>
