<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botanix | AI Plant Diagnostics</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="navbar">
        <div class="container">
            <div class="logo">
                <a href="index.html"><img src="image_1.png" alt="Botanix Logo" class="brand-logo"></a>
            </div>
            <nav class="nav-links">
                <a href="https://yasithbuckeroo2026.wixsite.com/botanix" class="active">Home</a>
                <a href="https://yasithbuckeroo2026.wixsite.com/botanix/portfolio">Portfolio Page</a>
            </nav>
        </div>
    </header>

    <main class="content-spacer">
        <div class="container ai-dashboard">
            
            <div class="scanner-section">
                <div class="ai-card">
                    <h2 class="ai-title">Botanix Scanner</h2>
                    
                    <div id="initial-controls">
                        <button type="button" id="start-btn" class="btn-primary" onclick="init()">
                            <i class="fas fa-camera"></i> Open Camera
                        </button>
                        <div class="divider"><span>OR</span></div>
                        <input type="file" id="file-upload" accept="image/*" style="display:none;" onchange="handleFileUpload(event)">
                        <button type="button" class="btn-upload" onclick="document.getElementById('file-upload').click()">
                            <i class="fas fa-file-upload"></i> Upload Photo
                        </button>
                    </div>

                    <div id="webcam-container" class="webcam-box" style="display:none;"></div>
                    <div id="capture-container" class="webcam-box" style="display:none;">
                        <canvas id="captured-photo"></canvas>
                    </div>

                    <div class="button-group">
                        <button type="button" id="capture-btn" class="btn-secondary" onclick="captureAndPredict()" style="display:none;">Analyze Plant</button>
                        <button type="button" id="retake-btn" class="btn-primary" onclick="resetScanner()" style="display:none;">New Scan</button>
                    </div>
                </div>
            </div>

            <div class="info-section">
                <div id="diagnosis-result" class="side-panel">
                    <div class="placeholder-msg">
                        <i class="fas fa-microscope"></i>
                        <p>Waiting for scan... <br>Analysis details will appear here.</p>
                    </div>
                </div>
            </div>

        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <div class="footer-top">
                <div class="footer-left">
                    <img src="image_1.png" alt="Botanix Logo" class="footer-brand-logo">
                </div>
                <div class="footer-center">
                    <p>Botanix AI Project<br>Faculty of Computing, SLIIT, Malabe<br>botanix.site@gmail.com</p>
                </div>
                <div class="footer-right">
                    <a href="https://www.facebook.com/profile.php?id=61582209766650&sk=directory_links" class="social-icon fb"><i class="fab fa-facebook-f"></i></a>
                    <a href="https://www.instagram.com/botanix.ai/" class="social-icon ig"><i class="fab fa-instagram"></i></a>
                    <a href="#" class="social-icon yt"><i class="fab fa-youtube"></i></a>
                    
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 Botanix AI. Pioneering agricultural diagnostics in Sri Lanka.</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script type="text/javascript">
        const URL = "./my_model/";

        // Dictionary for disease descriptions and recommended actions
        const diseaseInfo = {
            "Rice Blast": {
                description: `<b>Symptoms:</b>
                <ul>
                    <li>Spindle-shaped leaf spots with brown or reddish/yellowish-brown margins, ashy centers, and pointed ends are the common symptom.
                    <li>Fully developed lesions normally measure 1.0 -1.5 cm in length and 0.3 -0.5cm in breadth. </li>
                    <li>When nodes are infected, they become black and rot.</li>
                    <li>Infection of panicle base causes rotten neck or neck rot and causes the panicle to fall off. </li>
                    <li>When the infection is severe, secondary branches and grains are also affected resulting in partly filled grains, known as “whiteheads”. </li>
                    <li>Characteristics vary with the crop life stage, susceptibility level of the cultivar and environmental factors. </li>
                </ul><br>`,

                action: `
                <i><b>Within the crop season</b></i>
                <ul>
                    <li>Application of urea in recommended dosages or application of urea based on leaf colour chart.</li>
                    <li>Weed management</li>
                </ul><br>
                
                <i><b>If the disease spread fast, following fungicides could be applied:</b></i>
                <ul>
                    <li>Tebuconazole 250g/l EC – dissolve 10 ml in 16 l of water (8-10 tanks per acre)</li>
                    <li>Isoprothiolane 400g/l EC – dissolve 20 ml in 16 l of water (8-10 tanks per acre)</li>
                    <li>Carbendazim 50% WP/WG – dissolve 11 g/ 11 ml in 16 l of water (8-10 tanks per acre)</li>
                    <li>Tricyclazole 75 %WP – dissolve 10 g in 16 l of water (8-10 tanks per acre)</li>
                </ul><br>

                <i><b>If the crop is infected, following management options should be applied for the next season</b></i>
                <ul>
                    <li>Use of resistant varieties (Bg 403, Bg 406, Bg 366, Bg 359, Bw 361, Bg 250)</li>
                    <li>Use of certified seed paddy free from the disease</li>
                    <li>Addition of burnt paddy husk (250 kg per acre) to the soil during land preparation.</li>
                    <li>Abstain addition of disease infected straw.</li>
                </ul>`
            },

            "Bacterial Leaf Blight": {
                description: `<div style="text-align: right;"><a href="https://doa.gov.lk/rrdi_ricediseases_bacterialleafblight/">doa.gov.lk</a></div>
                <b>Symptoms</b><br><br>
                <ul>
                    <li>On seedling stage wilting and yellowing of leaves, or wilting of seedlings (called kresek). Kresek on seedlings may sometimes be confused with early rice stem borer damage. To distinguish kresek symptoms from stem borer damage, Kresek should show yellowish bacterial ooze coming out of the cut ends when leaves squeezed. Unlike plants infested with stem borer, rice plants with kresek are not easily pulled out from soil.</li>
                    <li>On mature plants, lesions usually develop as water-soaked orange stripes on leaf blades or leaf tips. Lesions have a wavy margin and progress toward the leaf base.</li>
                </ul><br>`,
                action: `<b><i>Within the crop season</b></i><br>
                <ul>
                    <li>Application of urea in recommended dosages or application of urea based on leaf colour chart.</li>
                    <li>Ensure good drainage of fields.</li>
                    <li>Immediately after the disease is observed,
                        stop water supply, and let the field dry.</li>
                    <li>When total removal of water is, not possible, try to out-flow water through drainage ditches or water courses (wakkada).</li>
                    <li>Water drained from the fields infected with disease should not be diverted through disease free fields as much as possible.</li>
                    <li>Once the disease is observed, application of potassium fertilizer could manage further spread of the disease.</li>
                </ul>`

            },
            "Brown Spot": {
                description: `<b>Symptoms</b><br><br>
                <ul>
                    <li>The fungus causes brown, circular to oval spots on the coleoptiles which may lead to seedling blight.</li>
                    <li>Seedling blight may cause sparse or inadequate stands and feeble plants.</li>
                    <li>The spots are smaller on young leaves, than on upper leaves.</li>
                    <li>Size and shape of the spots may vary from minute dark (dark brown to reddish brown) spots to large oval to circular spots (having dark brown margin and a light, reddish-brown or gray center). </li>
                    <li>The spots on the leaf sheath and hulls are similar to those on the leaves. </li>
                    <li>When the glumes are infected,  a general black discoloration could be observed.</li>
                    <li>When the immature florets are attacked, grain development might het hindered or kernels that are of light weight or chalky may result. </li>
                </ul><br>`,

                action: `<b><i>Within the crop season</i></b><br>
                    <ul>
                        <li>Application of urea in recommended dosages or application of urea based on leaf colour chart.</li>
                        <li>Weed management</li>
                    </ul>
                    
                    <b><i>If the crop is infected, following management options should be applied for the next season</b></i>
                    <ul>
                        <li>Application of organic fertilizer will increase the soil quality</li>
                        <li>Use of certified seed paddy free from the disease</li>
                        <li>Addition of burnt paddy husk (250 kg per acre) to the soil during land preparation.</li>
                        <li>Abstain addition of disease infected straw.</li>
                        <li>Treatment of seed paddy by dipping in hot water (53-54OC) for 10-12 minutes</li>
                        <li>Treatment of seeds with a seed-protectant fungicide</li>
                        <li>Crop rotation</li>
                        <li>Proper land leveling</li>
                    </ul>`
            },
            "Papaya Ring Spot": {
                description: "The plant shows no visible signs of the tracked diseases.",
                action: "Continue regular monitoring and standard fertilization schedules."
            },
            "Sheath Blight": {
                description: `<div style="text-align: right;"><a href="https://doa.gov.lk/rrdi_ricediseases_sheathblight/">doa.gov.lk</a></div>
                
                <b>Symptoms</b><br><br>
                <ul>
                    <li>Infection occurs through infected plants or sclerotia which survive in soil for a long time (depending on the temperature and moisture levels). In addition, infected straw, stubble, weeds could be the other sources of primary inoculums. </li>
                    <li>Spots or lesions initially develop near the water level (in flooded fields) or soil (in upland fields) and on the leaf sheath. <li>
                    <li>Spots or lesions might measure 1-3 cm long, may be oval or ellipsoidal initially but may get enlarged and irregular . Mainly on the leaf blade. Lesions are white in the center, banded with green, brown, and orange coloration. </li>
                    <li>At advanced stages, when the flag leaf is infected, panicle exertion is affected.</li>
                    <li>Asexual over-wintering structures known as sclerotia are formed on leaf sheath surface. They are usually 4-5 mm in diameter, white when young, turn brown or purplish brown at maturity and fall off easily on to soil surface and remain for years.</li>
                </ul><br>`,

                action: `<i><b>Within the crop season</b></i>
                <ul>
                    <li>Application of urea in recommended dosages or application of urea based on leaf colour chart.</li>
                    <li>Weed management</li>
                </ul><br>
                
                <i><b>If the disease spread fast, following fungicides could be applied</b></i>
                <ul>
                    <li>Hexconazole 50G/L EC – dissolve 32 ml in 16 l of water (8-10 tanks per acre)</li>
                    <li>Propiconazole 250 G/L EC – dissolve 16 ml in 16 l of water (8-10 tanks per acre)</li>
                    <li>Thiophanate methyl 70% WP – dissolve 16 g in 16 l of water (8-10 tanks per acre)</li>
                    <li>Pencicuron 25% WP – dissolve 32 g in 16 l of water (8-10 tanks per acre)</li>
                    <li>Tebuconazole 250g/l EC – dissolve 10 ml in 16 l of water (8-10 tanks per acre)</li>
                </ul><br>
                
                <i><b>If the crop is infected, following management options should be applied for the next season</b></i>
                <ul>
                    <li>Use of certified seed paddy free from the disease</li>
                    <li>Deep ploughing to bury infested plant residues into the soil</li>
                    <li>Use of recommended seed rate i. e. 2 bushels per acre (direct sowing).</li>
                    <li>Maintaining an average level plant population in the field</li>
                    <li>Addition of burnt paddy husk (250 kg per acre) to the soil during land preparation.</li>
                    <li>Abstain addition of disease infected straw</li>
                </ul><br>
                <b><u>*There are no genetically resistant varieties to this disease. Varieties with clean plant base (less/no unproductive tillers) seem to escape the disease.*</u></b>`
            },

            // Add all your Teachable Machine categories here!
        };

        let model, webcam, maxPredictions;
        let isStatic = false;
        let animationId; // Crucial for stopping the background loop

        async function loadModel() {
            if (!model) {
                model = await tmImage.load(URL + "model.json", URL + "metadata.json");
                maxPredictions = model.getTotalClasses();
            }
        }

        async function init() {
            try {
                const startBtn = document.getElementById("start-btn");
                startBtn.innerText = "Initializing...";
                startBtn.disabled = true;

                await loadModel();
                
                if (webcam) { await webcam.stop(); }

                webcam = new tmImage.Webcam(250, 250, true);
                await webcam.setup();
                await webcam.play();
                
                isStatic = false;
                // Capture the ID so we can kill it when capturing/resetting
                animationId = window.requestAnimationFrame(loop);

                const container = document.getElementById("webcam-container");
                container.innerHTML = ""; 
                container.appendChild(webcam.canvas);
                
                container.style.display = "block";
                document.getElementById("initial-controls").style.display = "none";
                document.getElementById("capture-btn").style.display = "block";
            } catch (err) {
                console.error(err);
                alert("Camera access denied or failed.");
                hardReset();
            }
        }

        async function loop() {
            if (!isStatic && webcam && webcam.canvas) {
                webcam.update();
                animationId = window.requestAnimationFrame(loop);
            }
        }

        async function captureAndPredict() {
            isStatic = true;
            // KILL the loop so the browser stops working in the background
            window.cancelAnimationFrame(animationId); 

            const staticCanvas = document.getElementById("captured-photo");
            const ctx = staticCanvas.getContext("2d");
            staticCanvas.width = webcam.canvas.width;
            staticCanvas.height = webcam.canvas.height;
            ctx.drawImage(webcam.canvas, 0, 0);

            document.getElementById("webcam-container").style.display = "none";
            document.getElementById("capture-container").style.display = "block";
            document.getElementById("capture-btn").style.display = "none";
            document.getElementById("retake-btn").style.display = "block";

            runDiagnosis(staticCanvas);
        }

        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            await loadModel();
            if (webcam) { 
                await webcam.stop(); 
                window.cancelAnimationFrame(animationId);
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    isStatic = true;
                    const staticCanvas = document.getElementById("captured-photo");
                    const ctx = staticCanvas.getContext("2d");
                    staticCanvas.width = 250;
                    staticCanvas.height = 250;
                    ctx.drawImage(img, 0, 0, 250, 250);

                    document.getElementById("initial-controls").style.display = "none";
                    document.getElementById("webcam-container").style.display = "none";
                    document.getElementById("capture-container").style.display = "block";
                    document.getElementById("retake-btn").style.display = "block";
                    runDiagnosis(staticCanvas);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // 1. Define the categories you want to hide (Names must match exactly what is in Teachable Machine)
        const hiddenClasses = ["HEALTHY Potato", "HEALTHY Coconut", "HEALTHY Carrots", "HEALTHY Rice", "HEALTHY Banana", "HEALTHY Cabbage", "HEALTHY Onion", "People", "HEALTHY Sugarcane", "HEALTHY Pumpkin", "HEALTHY Chilli", "HEALTHY Papaya"]; 

        async function runDiagnosis(source) {
            const resultDiv = document.getElementById("diagnosis-result");
            resultDiv.innerHTML = "<p>Analyzing image...</p>";
            
            const prediction = await model.predict(source);
            let topClass = "";
            let topProb = 0;

            prediction.forEach(p => {
                if (p.probability > topProb) {
                    topProb = p.probability;
                    topClass = p.className;
                }
            });

            if (hiddenClasses.includes(topClass)) {
                resultDiv.innerHTML = `
                    <h2>Healthy Plant</h2>
                    <div class="confidence-large">100% Normal</div>
                    <p class="detailed-desc">Our AI has analyzed the sample and found no significant traces of disease. This category typically includes healthy leaves or non-target backgrounds.</p>
                `;
                return;
            }

            const info = diseaseInfo[topClass] || { description: "Information pending...", action: "Consult expert." };
            const confidence = (topProb * 100).toFixed(0);

            resultDiv.innerHTML = `
                <h2>${topClass} Detected</h2>
                <div class="confidence-large">${confidence}% AI Match Confidence</div>
                
                <p class="detailed-desc">
                    <strong>About this condition:</strong><br>
                    ${info.description}
                </p>

                <div class="action-box">
                    <h4 style="color: var(--primary-color); margin-bottom: 10px;">Recommended Action Plan:</h4>
                    <p style="font-size: 16px; line-height: 1.6;">${info.action}</p>
                </div>
            `;
        }      
        

        function resetScanner() {
            isStatic = false;
            if (webcam) {
                document.getElementById("webcam-container").style.display = "block";
                document.getElementById("capture-btn").style.display = "block";
                animationId = window.requestAnimationFrame(loop);
            } else {
                document.getElementById("initial-controls").style.display = "block";
            }
            document.getElementById("capture-container").style.display = "none";
            document.getElementById("retake-btn").style.display = "none";
            document.getElementById("diagnosis-result").innerHTML = "";
        }

        async function hardReset() {
            isStatic = false;
            window.cancelAnimationFrame(animationId);
            if (webcam) { await webcam.stop(); webcam = null; }
            
            document.getElementById("initial-controls").style.display = "block";
            document.getElementById("webcam-container").style.display = "none";
            document.getElementById("capture-container").style.display = "none";
            document.getElementById("capture-btn").style.display = "none";
            document.getElementById("retake-btn").style.display = "none";
            document.getElementById("diagnosis-result").innerHTML = "";
            document.getElementById("start-btn").innerText = "Start Live Camera";
            document.getElementById("start-btn").disabled = false;
        }
    </script>
</body>
</html>
